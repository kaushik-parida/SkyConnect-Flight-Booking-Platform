name: Backend CI

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [booking-service]

    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Test with Coverage
        run: mvn verify -B -e

      - name: Print surefire failur reports
        if: failure()
        run: |
          echo "=== SUREFIRE FAILURE REPORTS ==="
          find target/surefire-reports -name "*.txt" | head -5 | xargs -I{} sh -c 'echo "--- {} ---" && cat {}'

      - name: Upload surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: backend/${{ matrix.service }}/target/surefire-reports/
          retention-days: 7

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: backend/${{ matrix.service }}/target/site/jacoco/
          retention-days: 7

      - name: SonarQube Analysis
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main'
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
        run: |
          mvn sonar:sonar -B \
           -Dsonar.host.url=$SONAR_HOST_URL \
           -Dsonar.token=$SONAR_TOKEN \
           -Dsonar.organization=$SONAR_ORGANIZATION \
           -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
           -Dsonar.projectKey=skyconnect-booking-service \
           -Dsonar.projectName="SkyConnect Booking Service" 
